SAMPLE_PROTOCOL: |
  The sample was subjected to freeze-thaw-vortex cycles under
  Ar(g) to ensure complete dispersion of the lipid; it was vortexed
  less than a minute each time to minimize the formation of small 
  liposomes or vesicles.
NMR:
  INSTRUMENT: |
    GN-300 (GE, Vermont) at 46.13 MHz  equipped with a
    home-built high-power transverse solenoid probe.
  METHOD: 2H:QE
  SIGN_MEASURED: NONE
  T_RF_HEATING: UNKNOWN
  DETAILS: |
    The 90° pulse length was typically 6 µs. A phase-cycled
    quadrupolar echo pulse sequence (Davis et al., 1976) was employed
    with a pulse spacing of 40 µs. Data were acquired beginning at
    30 µs after the second pulse and were Fourier transformed carefully
    beginning at the top of the echo. The pulse sequence was repeated
    every 500 ms, and the spectra were acquired with a digitization rate
    (spectral width) of 500 kHz. 

