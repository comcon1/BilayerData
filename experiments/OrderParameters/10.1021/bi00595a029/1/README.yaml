SAMPLE_PROTOCOL: >
  Appropriate amounts of lipid were dissolved in chloroform/methanol. Solvent was removed under nitrogen followed by at least 24 h under high vacuum. Buffer was added to yield 
  a final lipid:buffer ratio of 50:50 wt %. Ampoules were sealed and mixed above the phase transition temperature of pure phospholipids.

NMR:
  T_RF_HEATING: UNKNOWN
  INSTRUMENT: Bruker-Spectrospin HX-90-FT spectrometer (13.8 MHz for 2H, 36.4 MHz for 31P)
  METHOD: 2H:SP
  SIGN_MEASURED: NONE
  DETAILS: >
    The experiment investigated the influence of cholesterol on the orientation and flexibility of DPPC headgroups. Deuterium quadrupole splittings and Phosphorus-31 
    chemical shielding anisotropies were evaluated directly from powder-type spectra. 
    The values reported here for pure DPPC are extracted from the 0.0 cholesterol/lipid molar ratio point in Figure 2, which corresponds to measurements at 58 °C. 
    Direct 1H-13C NMR measurements have established that the order parameters for the alpha segment are positive, while the beta segment is negative

